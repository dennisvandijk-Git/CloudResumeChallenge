name: Blob storage website CI

on:
    push:
        branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: azure/login@v1
      with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Upload to blob storage
      uses: azure/CLI@v1
      with:
        inlineScript: |
            az storage blob upload-batch --account-name staticresumewebsite --account-key "${{ secrets.AZURE_STORAGE_KEY }}" --auth-mode key -d '$web' -s .
    - name: Purge CDN endpoint
      uses: azure/CLI@v1
      with:  
        inlineScript: |
            az cdn endpoint purge --content-paths "/*" --profile-name staticresumewebsite --name dennisvandijk --resource-group storage-resource-group --no-wait
  
  # Azure logout
    - name: logout
      run: |
            az logout
      if: always()
